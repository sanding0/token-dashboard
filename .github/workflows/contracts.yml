name: Contracts CI

on:
  push:
    paths:
      - "contracts/**"
      - "lib/abis/**"
      - "scripts/export-abi.mjs"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "contracts/**"
      - "lib/abis/**"
      - "scripts/export-abi.mjs"
      - ".github/workflows/contracts.yml"
  workflow_dispatch:

jobs:
  foundry:
    name: Foundry
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge install

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Check ABI is up to date
        working-directory: ${{ github.workspace }}
        run: |
          node scripts/export-abi.mjs
          if ! git diff --exit-code -- lib/abis; then
            echo "::error::lib/abis is out of date. Run 'pnpm abi:sync' locally and commit lib/abis."
            exit 1
          fi

      - name: Test
        run: forge test -vvv